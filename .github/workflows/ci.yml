name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validation:
    name: Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m py_compile TLGMapper.py scripts/validate.py
      - run: python scripts/validate.py